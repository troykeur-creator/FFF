          system: SYSTEM_PROMPT,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
          messages: [{ role: "user", content: userContent }],
        }),
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || "API error");
      const textBlock = data.content.filter((b) => b.type === "text").map((b) => b.text).join("");
      const jsonMatch = textBlock.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error("Could not find JSON in response. Please try again.");

      // Aggressive multi-pass sanitizer
      function cleanJson(str) {
        // Step 1: Replace all special unicode characters
        let s = str
          .replace(/[\u2018\u2019\u02BC\u2032]/g, "\'")
          .replace(/[\u201C\u201D\u00AB\u00BB]/g, '\"')
          .replace(/[\u2013\u2014\u2015\u2012]/g, "-")
          .replace(/\u2026/g, "...")
          .replace(/[\u00A0\u200B\u200C\u200D\uFEFF]/g, " ")
          .replace(/[\u0080-\u009F]/g, "")
          .replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/g, " ");

        // Step 2: Fix unescaped newlines/tabs INSIDE string values
        // Walk character by character to handle strings properly
        let result = "";
        let inString = false;
        let escaped = false;
        for (let i = 0; i < s.length; i++) {
          const ch = s[i];
          if (escaped) {
            result += ch;
            escaped = false;
            continue;
          }
          if (ch === "\\") {
            result += ch;
            escaped = true;
            continue;
          }
          if (ch === '"') {
            inString = !inString;
            result += ch;
            continue;
          }
          if (inString) {
            if (ch === "\n") { result += "\\n"; continue; }
            if (ch === "\r") { result += "\\r"; continue; }
            if (ch === "\t") { result += "\\t"; continue; }
          }
          result += ch;
        }
        return result;
      }

      let jsonStr = cleanJson(jsonMatch[0]);
      let parsed;
      try {
        parsed = JSON.parse(jsonStr);
      } catch(e) {
        // Second attempt: strip everything except safe ASCII + common unicode
        try {
          const stripped = jsonStr.replace(/[^\x20-\x7E\n\r\t]/g, " ");
          parsed = JSON.parse(stripped);
        } catch(e2) {
          // Final attempt: Function evaluator (more lenient)
          try {
            parsed = Function('"use strict"; return (' + jsonStr + ")")();
          } catch(e3) {
            // Show exactly what broke for debugging
            const lines = jsonStr.split("\n");
            const badLine = lines[33] || lines[lines.length-1];
            throw new Error("Parse error near: " + badLine.substring(0,80) + " — Please hit 🔄 Regenerate.");
          }
        }
      }
      setContent(parsed);
      if (parsed.stories) {
        const newTopics = parsed.stories.map(s => s.headline).join("; ");
        setUsedTopics(prev => {
          const updated = [...prev.slice(-7), newTopics];
          try { localStorage.setItem("fff_used_topics", JSON.stringify(updated)); } catch(e) {}
          return updated;
        });
        // Edition number is manually controlled — do not auto-increment
        try { localStorage.setItem("fff_edition_num", editionNum); } catch(e) {}
        // Save to history
        const historyEntry = {
          editionNum,
          weekLabel,
          date: new Date().toISOString(),
          content: parsed,
        };
        setHistory(prev => {
          const updated = [historyEntry, ...prev].slice(0, 52); // keep 1 year
          try { localStorage.setItem("fff_history", JSON.stringify(updated)); } catch(e) {}
          return updated;
        });
      }
    } catch(err) {
      setError(err.message || "Something went wrong. Please try again.");
    } finally {
      setLoading(false);
    }
  }

  function copyEmail() {
    if (!content) return;
    const html = buildEmailHtml();
    try {
      const blob = new Blob([html], { type: "text/html" });
      const item = new ClipboardItem({ "text/html": blob });
      navigator.clipboard.write([item]).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2500); }).catch(() => fallbackCopyHtml(html));
    } catch(e) { fallbackCopyHtml(html); }
  }

  function fallbackCopyHtml(html) {
    const div = document.createElement("div");
    div.innerHTML = html;
    div.style.cssText = "position:fixed;top:0;left:0;width:640px;opacity:0.01;pointer-events:none;";
    document.body.appendChild(div);
    const range = document.createRange(); range.selectNode(div);
    const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
    try { document.execCommand("copy"); setCopied(true); setTimeout(() => setCopied(false), 2500); }
    catch(e) { alert("Copy failed — use Chrome or Edge on a Windows laptop."); }
    sel.removeAllRanges(); document.body.removeChild(div);
  }

          <div style={{ textAlign:"center", padding:"60px 0", color:"#888", fontFamily:"Arial,sans-serif" }}>
            <div style={{ fontSize:"40px", marginBottom:"16px" }}>🔎</div>
            <div style={{ fontSize:"17px", marginBottom:"8px", color:"#ccc" }}>Scanning this week's fraud landscape...</div>
            <div style={{ fontSize:"14px" }}>Searching 6 source categories · United States only</div>
          </div>
        )}

        {error && (
          <div style={{ background:"#2a1010", border:"1px solid #6b1a1a", borderRadius:"6px", padding:"16px 20px", color:"#f87171", fontFamily:"Arial,sans-serif", fontSize:"14px" }}>
            ⚠️ {error}
          </div>
        )}

        {content && (
          <div>
            <div style={{ borderLeft:"4px solid #f96302", paddingLeft:"20px", marginBottom:"32px" }}>
              <div style={{ fontFamily:"'Arial Black',sans-serif", fontSize:"11px", letterSpacing:"3px", color:"#f96302", textTransform:"uppercase", marginBottom:"8px" }}>This Week's Edition</div>
              <div className="fff-edition-title" style={{ fontFamily:"Georgia,serif", fontSize:"26px", fontWeight:"bold", color:"#f0ede6", lineHeight:"1.3" }}>{content.edition_title}</div>
            </div>

            <div style={{ background:"#1a1a1a", borderRadius:"8px", padding:"28px 32px", marginBottom:"28px", borderLeft:"3px solid #444" }}>
              <div style={{ fontFamily:"Arial,sans-serif", fontSize:"11px", letterSpacing:"2px", color:"#888", textTransform:"uppercase", marginBottom:"12px" }}>Opening Note</div>
              <p style={{ fontFamily:"Georgia,serif", fontSize:"18px", lineHeight:"1.8", color:"#d4cfc7", margin:0 }}>{content.opening}</p>
            </div>

            <div style={{ marginBottom:"24px" }}>
              <div style={{ fontFamily:"Arial,sans-serif", fontSize:"11px", letterSpacing:"3px", color:"#888", textTransform:"uppercase", marginBottom:"16px" }}>This Week's Stories</div>
              {content.stories?.map((story, i) => (
                <div key={i} className="fff-card" style={{ background:"#161616", border:"1px solid #242424", borderRadius:"8px", padding:"22px 26px", marginBottom:"14px" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"12px", flexWrap:"wrap" }}>
                    <div style={{ background:categories[story.category]||"#444", color:"#fff", padding:"3px 10px", borderRadius:"3px", fontSize:"10px", fontFamily:"Arial,sans-serif", fontWeight:"bold", letterSpacing:"1px", textTransform:"uppercase" }}>{story.category}</div>
                    <div style={{ fontSize:"11px", color:"#555", fontFamily:"Arial,sans-serif" }}>Story {i+1}</div>
                  </div>
                  <div className="fff-story-headline" style={{ fontFamily:"Georgia,serif", fontSize:"19px", fontWeight:"bold", color:"#f0ede6", marginBottom:"10px", lineHeight:"1.4" }}>{story.headline}</div>
                  <p className="fff-story-summary" style={{ fontFamily:"Georgia,serif", fontSize:"15px", lineHeight:"1.75", color:"#b8b3aa", margin:"0 0 12px 0" }}>{story.summary}</p>
                  <div style={{ background:"#1a2744", padding:"10px 14px", borderRadius:"0 0 4px 4px", display:"flex", gap:"8px", alignItems:"flex-start" }}>
                    <span style={{ color:"#f96302", fontFamily:"'Arial Black',sans-serif", fontSize:"11px", whiteSpace:"nowrap", marginTop:"1px" }}>HD RELEVANCE →</span>
                    <span style={{ fontFamily:"Arial,sans-serif", fontSize:"13px", color:"#e8e4dc", lineHeight:"1.6" }}>{story.relevance}</span>
                  </div>
                </div>
              ))}
            </div>

            <div style={{ background:"linear-gradient(135deg,#1a1208 0%,#1a1a1a 100%)", border:"1px solid #3d2e10", borderLeft:"4px solid #f96302", borderRadius:"8px", padding:"26px 30px", marginBottom:"16px" }}>
              <div style={{ fontFamily:"'Arial Black',sans-serif", fontSize:"11px", letterSpacing:"3px", color:"#f96302", textTransform:"uppercase", marginBottom:"12px" }}>This Week's Takeaway</div>
              <p style={{ fontFamily:"Georgia,serif", fontSize:"17px", lineHeight:"1.8", color:"#e8e0d0", margin:"0 0 14px 0" }}>{content.takeaway}</p>
              <div style={{ fontFamily:"Georgia,serif", fontSize:"15px", fontWeight:"bold", fontStyle:"italic", color:"#f96302" }}>{content.sign_off}</div>
            </div>

            <div style={{ background:"#1a2744", borderTop:"3px solid #f96302", borderLeft:"4px solid #f96302", borderRadius:"6px", padding:"18px 24px", marginBottom:"24px" }}>
              <div style={{ fontFamily:"Arial,sans-serif", fontSize:"17px", fontWeight:"bold", color:"#fff", marginBottom:"3px", letterSpacing:"0.3px" }}>Troy Keur</div>
              <div style={{ fontFamily:"Arial,sans-serif", fontSize:"12px", color:"#f96302", fontWeight:"bold", letterSpacing:"1px", textTransform:"uppercase", marginBottom:"2px" }}>Sr. Manager, Customer Identity Trust</div>
              <div style={{ fontFamily:"Arial,sans-serif", fontSize:"12px", color:"#a0b0c8" }}>The Home Depot · Fraud Prevention</div>
            </div>

            <div className="fff-actions" style={{ display:"flex", gap:"12px", flexWrap:"wrap" }}>
              <button onClick={copyEmail} style={{ background:copied?"#065f46":"#1a1a1a", color:copied?"#6ee7b7":"#f0ede6", border:`1px solid ${copied?"#065f46":"#333"}`, padding:"12px 22px", borderRadius:"6px", fontSize:"14px", fontFamily:"Arial,sans-serif", cursor:"pointer", transition:"all 0.2s" }}>
                {copied ? "✓ Copied!" : "📋 Copy as Email"}
              </button>
              <button onClick={savePdf} style={{ background:"#1a1a1a", color:"#f0ede6", border:"1px solid #333", padding:"12px 22px", borderRadius:"6px", fontSize:"14px", fontFamily:"Arial,sans-serif", cursor:"pointer" }}>
                📄 Save as PDF
              </button>
              <button onClick={generate} style={{ background:"#1a1a1a", color:"#888", border:"1px solid #333", padding:"12px 22px", borderRadius:"6px", fontSize:"14px", fontFamily:"Arial,sans-serif", cursor:"pointer" }}>
                🔄 Regenerate
              </button>
            </div>
          </div>
        )}

        {/* HISTORY MODAL */}
        {showHistory && (
          <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.9)", zIndex:1000, display:"flex", flexDirection:"column" }}>
            <div style={{ background:"#0f0f0f", borderBottom:"3px solid #f96302", padding:"16px 24px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ fontFamily:"'Arial Black',sans-serif", fontSize:"11px", letterSpacing:"3px", color:"#f96302", textTransform:"uppercase", marginBottom:"4px" }}>Past Editions</div>
                <div style={{ fontFamily:"Georgia,serif", fontSize:"20px", color:"#f0ede6" }}>Friday Fraud Facts Archive</div>
              </div>
              <button onClick={() => { setShowHistory(false); setHistoryView(null); }} style={{ background:"none", border:"1px solid #333", color:"#888", fontSize:"18px", cursor:"pointer", borderRadius:"6px", padding:"6px 12px" }}>✕ Close</button>
            </div>
            <div style={{ display:"flex", flex:1, overflow:"hidden" }}>
              {/* Edition List */}
              <div style={{ width:"280px", borderRight:"1px solid #222", overflowY:"auto", flexShrink:0 }}>
                {history.map((entry, i) => (
                  <div key={i} onClick={() => setHistoryView(entry)} style={{ padding:"14px 18px", borderBottom:"1px solid #1a1a1a", cursor:"pointer", background:historyView===entry?"#1a2744":"transparent", transition:"background 0.15s" }}>
                    <div style={{ fontFamily:"'Arial Black',sans-serif", fontSize:"12px", color:historyView===entry?"#f96302":"#888", marginBottom:"4px" }}>Edition #{entry.editionNum}</div>
                    <div style={{ fontFamily:"Georgia,serif", fontSize:"13px", color:historyView===entry?"#f0ede6":"#ccc", lineHeight:"1.3", marginBottom:"4px" }}>{entry.content.edition_title}</div>
                    <div style={{ fontFamily:"Arial,sans-serif", fontSize:"11px", color:"#555" }}>{entry.weekLabel}</div>
                  </div>
                ))}
              </div>
              {/* Edition Preview */}
              <div style={{ flex:1, overflowY:"auto", padding:"24px 28px" }}>
                {historyView ? (
                  <div>
                    <div style={{ borderLeft:"4px solid #f96302", paddingLeft:"16px", marginBottom:"24px" }}>
                      <div style={{ fontFamily:"'Arial Black',sans-serif", fontSize:"10px", letterSpacing:"3px", color:"#f96302", textTransform:"uppercase", marginBottom:"6px" }}>Edition #{historyView.editionNum} · {historyView.weekLabel}</div>
                      <div style={{ fontFamily:"Georgia,serif", fontSize:"22px", fontWeight:"bold", color:"#f0ede6", lineHeight:"1.3" }}>{historyView.content.edition_title}</div>
                    </div>
                    <div style={{ background:"#1a1a1a", borderRadius:"8px", padding:"20px 24px", marginBottom:"20px", borderLeft:"3px solid #444" }}>
                      <div style={{ fontFamily:"Arial,sans-serif", fontSize:"10px", letterSpacing:"2px", color:"#888", textTransform:"uppercase", marginBottom:"10px" }}>Opening Note</div>
                      <p style={{ fontFamily:"Georgia,serif", fontSize:"16px", lineHeight:"1.8", color:"#d4cfc7", margin:0 }}>{historyView.content.opening}</p>
                    </div>
                    {historyView.content.stories?.map((story, i) => (
                      <div key={i} style={{ background:"#161616", border:"1px solid #242424", borderRadius:"8px", padding:"18px 22px", marginBottom:"12px" }}>
                        <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"10px" }}>
                          <div style={{ background:categories[story.category]||"#444", color:"#fff", padding:"2px 8px", borderRadius:"3px", fontSize:"9px", fontFamily:"Arial,sans-serif", fontWeight:"bold", letterSpacing:"1px", textTransform:"uppercase" }}>{story.category}</div>
                        </div>
                        <div style={{ fontFamily:"Georgia,serif", fontSize:"16px", fontWeight:"bold", color:"#f0ede6", marginBottom:"8px", lineHeight:"1.4" }}>{story.headline}</div>
                        <p style={{ fontFamily:"Georgia,serif", fontSize:"13px", lineHeight:"1.7", color:"#b8b3aa", margin:"0 0 10px 0" }}>{story.summary}</p>
                        <div style={{ background:"#1a2744", padding:"8px 12px", borderRadius:"0 0 4px 4px" }}>
                          <span style={{ color:"#f96302", fontFamily:"'Arial Black',sans-serif", fontSize:"10px" }}>HD RELEVANCE → </span>
                          <span style={{ fontFamily:"Arial,sans-serif", fontSize:"12px", color:"#e8e4dc" }}>{story.relevance}</span>
                        </div>
                      </div>
                    ))}
                    <div style={{ background:"linear-gradient(135deg,#1a1208 0%,#1a1a1a 100%)", border:"1px solid #3d2e10", borderLeft:"4px solid #f96302", borderRadius:"8px", padding:"20px 24px", marginTop:"8px" }}>
                      <div style={{ fontFamily:"'Arial Black',sans-serif", fontSize:"10px", letterSpacing:"3px", color:"#f96302", textTransform:"uppercase", marginBottom:"10px" }}>This Week's Takeaway</div>
                      <p style={{ fontFamily:"Georgia,serif", fontSize:"15px", lineHeight:"1.8", color:"#e8e0d0", margin:"0 0 10px 0" }}>{historyView.content.takeaway}</p>
                      <div style={{ fontFamily:"Georgia,serif", fontSize:"14px", fontWeight:"bold", fontStyle:"italic", color:"#f96302" }}>{historyView.content.sign_off}</div>
                    </div>
                    <div style={{ display:"flex", gap:"10px", marginTop:"16px" }}>
                      <button onClick={() => { setContent(historyView.content); setEditionNum(historyView.editionNum); setShowHistory(false); }} style={{ background:"#f96302", color:"#fff", border:"none", padding:"10px 20px", borderRadius:"6px", fontSize:"13px", fontFamily:"Arial,sans-serif", cursor:"pointer" }}>
                        📋 Load & Copy This Edition
                      </button>
                      <button onClick={() => { const updated = history.filter((_,idx) => idx !== history.indexOf(historyView)); setHistory(updated); try { localStorage.setItem("fff_history", JSON.stringify(updated)); } catch(e) {} setHistoryView(null); }} style={{ background:"#1a1a1a", color:"#888", border:"1px solid #333", padding:"10px 20px", borderRadius:"6px", fontSize:"13px", fontFamily:"Arial,sans-serif", cursor:"pointer" }}>
                        🗑 Delete
                      </button>
                    </div>
                  </div>
                ) : (
                  <div style={{ textAlign:"center", paddingTop:"80px", color:"#555", fontFamily:"Arial,sans-serif" }}>
                    <div style={{ fontSize:"36px", marginBottom:"12px" }}>📚</div>
                    <div style={{ fontSize:"15px" }}>Select an edition from the list to preview it</div>
                  </div>
                )}
              </div>
            </div>
          </div>
        )}

        {!loading && !content && (
          <div style={{ marginTop:"8px", background:"#111", border:"1px solid #222", borderRadius:"8px", padding:"24px" }}>
            <div style={{ fontFamily:"'Arial Black',sans-serif", fontSize:"11px", letterSpacing:"3px", color:"#555", textTransform:"uppercase", marginBottom:"20px" }}>Your Roadmap</div>
            {[
              { phase:"Phase 1", label:"✅ Manual Generator — Live", desc:"Click Generate → review → Copy as Email → paste into Outlook.", status:"active" },
              { phase:"Phase 2", label:"Thursday Auto-Draft — Pending", desc:"Google Apps Script emails you a draft every Thursday at noon CT. Ready to set up.", status:"next" },
              { phase:"Phase 3", label:"Full Send Automation — Future", desc:"One-click approve → auto-sends to team DL + Viva Engage.", status:"future" },
            ].map((item, i) => (
              <div key={i} style={{ display:"flex", gap:"16px", marginBottom:"16px", alignItems:"flex-start" }}>
                <div style={{ background:item.status==="active"?"#f96302":item.status==="next"?"#1a3a5c":"#1a1a1a", border:`1px solid ${item.status==="active"?"#f96302":item.status==="next"?"#2a5a8c":"#333"}`, borderRadius:"4px", padding:"3px 10px", fontSize:"10px", fontFamily:"'Arial Black',sans-serif", color:item.status==="active"?"#fff":item.status==="next"?"#7ab3e0":"#555", whiteSpace:"nowrap" }}>{item.phase}</div>
                <div>
                  <div style={{ fontFamily:"Arial,sans-serif", fontSize:"14px", color:item.status==="active"?"#f0ede6":"#888", fontWeight:"bold", marginBottom:"3px" }}>{item.label}</div>
                  <div style={{ fontFamily:"Arial,sans-serif", fontSize:"12px", color:"#555", lineHeight:"1.5" }}>{item.desc}</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FraudFactsGenerator />);
  </script>
</body>
</html>
